server {
    listen 80;
    server_name elec.nobodyls.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name elec.nobodyls.cn;

    ssl_certificate     /etc/letsencrypt/live/nobodyls.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nobodyls.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 项目根目录（静态页面 + data/history.json）
    root /path/to/elecmon;
    index index.html;

    # 静态页面
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 数据文件（允许跨域，禁用缓存确保实时）
    location /data/history.json {
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma no-cache;
        add_header Expires 0;
    }
}
